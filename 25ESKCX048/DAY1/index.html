
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .profile {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #4a90e2;
        }

        h1, h2 {
            color: #2c3e50;
        }

        .info {
            margin-bottom: 20px;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skills span {
            background: #4a90e2;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, textarea, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            background: #4a90e2;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #357ab8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <img src="keshav.jpeg" alt="Profile picture">
            <h1>Your Name</h1>
            <p>Beginner web developer | Learning HTML, CSS, and JavaScript</p>
        </div>

        <div class="info">
            <h2>About Me</h2>
            <p>I am a beginner who enjoys building simple websites and learning new web design skills.</p>
        </div>

        <div class="info">
            <h2>Skills</h2>
            <div class="skills">
                <span>HTML</span>
                <span>CSS</span>
                <span>JavaScript</span>
                <span>Bootstrap</span>
            </div>
        </div>

        <div class="info">
            <h2>Contact Me</h2>
            <p>Email: <a href="mailto:keshavgupta3354@gmail.com">keshavgupta3354@gmail.com</a></p>
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea rows="4" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>
</body>
</html>
